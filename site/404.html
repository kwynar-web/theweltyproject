<style>
  :root{
    --ink:#1c1a17; --parchment:#f5efe2; --parchment-deep:#ede4cf;
    --gold:#b8912f; --gold-bright:#d4af37; --crimson:#7a1f1f;
    --rule:#cbb98d; --muted:#6e6353;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; display:flex; flex-direction:column;
    background:linear-gradient(180deg,var(--parchment),var(--parchment-deep));
    color:var(--ink); font-family:'EB Garamond',Georgia,serif;
  }
  main.center{flex:1; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:40px 20px;}
  .card{max-width:560px}
  img.crest{width:150px; height:auto; filter:drop-shadow(0 4px 10px rgba(60,45,20,.25)); margin-bottom:18px}
  .code{
    font-family:'Cormorant SC','EB Garamond',serif; letter-spacing:6px;
    color:var(--gold); font-size:.95rem; font-weight:600; margin-bottom:6px;
  }
  h1{font-family:'Cormorant SC',serif; font-size:2.1rem; margin:0 0 10px; color:var(--crimson)}
  p{font-size:1.12rem; line-height:1.55; color:var(--muted); margin:0 auto 26px; max-width:44ch}
  .rule{width:120px; height:2px; background:var(--gold-bright); margin:0 auto 22px; opacity:.8}
  .btns{display:flex; gap:12px; justify-content:center; flex-wrap:wrap}
  a.btn{
    display:inline-block; text-decoration:none; font-size:1rem;
    padding:10px 20px; border-radius:6px; border:1px solid var(--gold);
    color:var(--ink); background:var(--parchment); transition:.15s;
  }
  a.btn:hover{background:var(--gold-bright); border-color:var(--gold-bright)}
  a.btn.primary{background:var(--crimson); color:#f7efe0; border-color:var(--crimson)}
  a.btn.primary:hover{background:#8f2626}
</style>
